<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo — Playeras Beloma</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap');
:root{--verde:#6AAB1F;--magenta:#D4117A;--dark:#1A1A1A;--bg:#F8F8F6;--card:#fff;--border:#E8E8E4;--text:#1A1A1A;--soft:#6B6B6B;--ws:#25D366;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--dark);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.carrito-btn{background:var(--magenta);color:#fff;border:none;border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
.carrito-badge{background:#fff;color:var(--magenta);border-radius:50%;width:18px;height:18px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.hero{background:linear-gradient(135deg,var(--dark) 0%,#2D1A2E 100%);padding:28px 20px;text-align:center;color:#fff;}
.hero h1{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:6px;}
.hero p{font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:18px;}
.search-bar{max-width:500px;margin:0 auto;display:flex;gap:8px;}
.search-bar input{flex:1;border:none;border-radius:25px;padding:11px 18px;font-size:14px;outline:none;font-family:'Inter',sans-serif;}
.search-bar button{background:var(--verde);color:#fff;border:none;border-radius:25px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.nav-bar{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.nav-btn{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);color:var(--soft);background:#fff;transition:all 0.15s;font-family:'Inter',sans-serif;white-space:nowrap;}
.nav-btn.active{background:var(--dark);color:#fff;border-color:var(--dark);}
.nav-btn:hover:not(.active){border-color:var(--verde);color:var(--verde);}
.breadcrumb{padding:10px 20px;font-size:12px;color:var(--soft);display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:#fff;}
.breadcrumb .bc-link{cursor:pointer;color:var(--verde);}
.content{padding:16px 20px;}
.grid-carpetas{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.carpeta-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px 8px;text-align:center;cursor:pointer;transition:all 0.15s;}
.carpeta-card:hover{border-color:var(--verde);transform:translateY(-2px);}
.carpeta-card .icon{font-size:32px;margin-bottom:6px;}
.carpeta-card .name{font-size:11px;font-weight:600;line-height:1.3;word-break:break-word;}
.grid-imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.img-card{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all 0.15s;}
.img-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.08);}
.img-card img{width:100%;aspect-ratio:1;object-fit:cover;background:#f0f0ec;display:block;}
.img-card .img-name{padding:5px 8px;font-size:10px;color:var(--soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.estado-txt{text-align:center;padding:40px;color:var(--soft);font-size:14px;}
.pag-wrap{display:flex;justify-content:center;margin-top:16px;}
.btn-mas{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:10px 24px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;}
.btn-mas:hover{border-color:var(--verde);color:var(--verde);}
/* VISOR */
#visor{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:2000;align-items:center;justify-content:center;}
#visor.open{display:flex;}
#visor-img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:8px;}
.vbtn{position:absolute;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:28px;cursor:pointer;border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;}
#visor-cerrar{top:14px;right:14px;font-size:22px;}
#visor-prev{left:10px;top:50%;transform:translateY(-50%);}
#visor-next{right:10px;top:50%;transform:translateY(-50%);}
#visor-info{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.6);font-size:11px;max-width:80%;text-align:center;}
#visor-count{position:absolute;top:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:11px;}
/* MODAL PEDIDO */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;}
.modal-body{padding:20px;}
.lbl{font-size:11px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.opts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.opt{padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;background:#fff;font-family:'Inter',sans-serif;}
.opt.active{background:var(--dark);color:#fff;border-color:var(--dark);}
.cant-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.cant-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-agregar{width:100%;background:var(--verde);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:10px;}
.btn-cerrar{width:100%;background:transparent;color:var(--soft);border:1.5px solid var(--border);border-radius:12px;padding:12px;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;}
/* CARRITO */
.c-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:600;align-items:flex-end;justify-content:center;}
.c-overlay.open{display:flex;}
.c-panel{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;padding:20px;}
.c-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.c-item img{width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.c-total{display:flex;justify-content:space-between;padding:14px 0;font-size:15px;font-weight:700;}
.btn-ws{width:100%;background:var(--ws);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-vaciar{width:100%;background:transparent;color:var(--soft);border:1.5px solid var(--border);border-radius:12px;padding:12px;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;}
@media(min-width:600px){
  .overlay,.c-overlay{align-items:center;padding:20px;}
  .modal,.c-panel{border-radius:20px;max-height:90vh;}
  .grid-imgs{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}
}
</style>
</head>
<body>

<div class="header">
  <div style="font-family:'DM Serif Display',serif;color:#fff;font-size:16px;">Playeras Beloma</div>
  <button class="carrito-btn" onclick="abrirCarrito()">
    🛒 Mi pedido <span class="carrito-badge" id="c-count">0</span>
  </button>
</div>

<div class="hero">
  <h1>Catálogo de Diseños</h1>
  <p>Elige tu categoría y encuentra tu diseño favorito</p>
  <div class="search-bar">
    <input type="text" id="q-input" placeholder="Buscar diseño..."
      onkeydown="if(event.key==='Enter')buscar()">
    <button onclick="buscar()">Buscar</button>
  </div>
</div>

<div class="nav-bar">
  <button class="nav-btn active" data-cat="" onclick="selCat(this)">✨ Todas</button>
  <button class="nav-btn" data-cat="Anime" onclick="selCat(this)">Anime</button>
  <button class="nav-btn" data-cat="Caricaturas Actuales" onclick="selCat(this)">Caricaturas Actuales</button>
  <button class="nav-btn" data-cat="Caricaturas Retro" onclick="selCat(this)">Caricaturas Retro</button>
  <button class="nav-btn" data-cat="Deportes" onclick="selCat(this)">Deportes</button>
  <button class="nav-btn" data-cat="Diseños" onclick="selCat(this)">Diseños</button>
  <button class="nav-btn" data-cat="Grupos Musicales" onclick="selCat(this)">Grupos Musicales</button>
  <button class="nav-btn" data-cat="Juguetes & Juegos" onclick="selCat(this)">Juguetes & Juegos</button>
  <button class="nav-btn" data-cat="Libros, Revistas y Cómics" onclick="selCat(this)">Libros & Cómics</button>
  <button class="nav-btn" data-cat="Peliculas" onclick="selCat(this)">Películas</button>
  <button class="nav-btn" data-cat="Personajes" onclick="selCat(this)">Personajes</button>
  <button class="nav-btn" data-cat="Series" onclick="selCat(this)">Series</button>
  <button class="nav-btn" data-cat="Superheroes" onclick="selCat(this)">Superhéroes</button>
  <button class="nav-btn" data-cat="Videojuegos" onclick="selCat(this)">Videojuegos</button>
</div>

<div id="breadcrumb" class="breadcrumb" style="display:none;"></div>

<div class="content">
  <div id="estado" class="estado-txt">Selecciona una categoría para explorar.</div>
  <div id="grid"></div>
  <div id="pag" class="pag-wrap"></div>
</div>

<!-- VISOR -->
<div id="visor">
  <button class="vbtn" id="visor-cerrar" onclick="cerrarVisor()">×</button>
  <div id="visor-count"></div>
  <button class="vbtn" id="visor-prev" onclick="visorNav(-1)">‹</button>
  <img id="visor-img" src="">
  <button class="vbtn" id="visor-next" onclick="visorNav(1)">›</button>
  <div id="visor-info"></div>
</div>

<!-- MODAL PEDIDO -->
<div class="overlay" id="modal-pedido">
  <div class="modal">
    <div id="mp-img"></div>
    <div class="modal-body">
      <div style="font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:4px;" id="mp-nombre"></div>
      <div class="lbl" style="margin-top:12px;">Color de playera</div>
      <div class="opts" id="mp-colores"></div>
      <div class="lbl">Género</div>
      <div class="opts" id="mp-generos"></div>
      <div class="lbl">Talla</div>
      <div class="opts" id="mp-tallas"></div>
      <div class="lbl">Cantidad</div>
      <div class="cant-row">
        <button class="cant-btn" onclick="cambiarCant(-1)">−</button>
        <span style="font-size:18px;font-weight:700;min-width:28px;text-align:center;" id="mp-cant">1</span>
        <button class="cant-btn" onclick="cambiarCant(1)">+</button>
      </div>
      <input type="text" id="mp-nombre-cliente" placeholder="Tu nombre (opcional)"
        style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;
               font-size:14px;font-family:'Inter',sans-serif;outline:none;margin-bottom:10px;">
      <textarea id="mp-notas" placeholder="Notas (opcional)" rows="2"
        style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;
               font-size:14px;font-family:'Inter',sans-serif;outline:none;resize:none;margin-bottom:14px;"></textarea>
      <button class="btn-agregar" onclick="agregarAlCarrito()">🛒 Agregar al pedido</button>
      <button class="btn-cerrar" onclick="cerrarOverlay('modal-pedido')">Cerrar</button>
    </div>
  </div>
</div>

<!-- CARRITO -->
<div class="c-overlay" id="carrito">
  <div class="c-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-family:'DM Serif Display',serif;font-size:20px;">Mi pedido</div>
      <button onclick="cerrarOverlay('carrito')" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--soft);">×</button>
    </div>
    <div id="c-items"></div>
    <div id="c-empty" style="text-align:center;padding:30px;color:var(--soft);">Tu pedido está vacío.</div>
    <div id="c-footer" style="display:none;">
      <div class="c-total"><span>Total</span><span id="c-total">A cotizar</span></div>
      <button class="btn-ws" onclick="enviarWs()">💬 Enviar por WhatsApp</button>
      <button class="btn-vaciar" onclick="vaciarCarrito()">Vaciar pedido</button>
    </div>
  </div>
</div>

<script>
const WORKER = 'https://hidden-fire-32cb.fcristerna1.workers.dev';
const ROOT   = '1N7efR6KLBl0OvS_EXCWsVg0NhW62OKbs';
const WS     = '526691549680';

const TALLAS = {
  'Hombre':        ['S','M','L','XL','2XL','3XL'],
  'Mujer':         ['S','M','L','XL'],
  'Niño':          ['CH (4a)','MED (6a)','GDE (8a)','XL (10a)'],
  'Juvenil':       ['CH (12a)','MED (14a)','GDE (16a)','XL (18a)'],
  'Bebé':          ['Talla 1','Talla 2','Talla 3'],
  'Bebé Pañalero': ['3m','6m','9m','12m','18m','24m']
};

// Estado global
let carrito = [];
let visorImgs = [];
let visorIdx  = 0;
let imgActual = null;
let colorSel = '', generoSel = '', tallaSel = '', cantSel = 1;
let carpetaId = null;  // carpeta actual para búsqueda

// ── API ────────────────────────────────────────────────────
async function api(params) {
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(`${WORKER}?${qs}`);
  return res.json();
}

// ── NAVEGACIÓN ─────────────────────────────────────────────
window.selCat = async function(btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const cat = btn.dataset.cat;
  carpetaId = null;
  historial = [];
  setBreadcrumb('');

  if(!cat) {
    setEstado('Selecciona una categoría para explorar.');
    return;
  }

  setEstado('⏳ Cargando...');
  try {
    const data = await api({ action:'list', parentId: ROOT, type:'folders', q: cat });
    const folder = (data.files || []).find(f => f.name.toLowerCase().includes(cat.toLowerCase())) || data.files?.[0];
    if(!folder) { setEstado('No se encontró la categoría.'); return; }
    carpetaId = folder.id;
    setBreadcrumb(cat);
    await mostrarContenido(folder.id, cat);
  } catch(e) {
    setEstado('❌ Error al conectar.');
    console.error(e);
  }
};

// Historial para volver
let historial = [];

async function mostrarContenido(folderId, breadcrumb, esRaizCat = false) {
  setEstado('⏳ Cargando...');
  carpetaId = folderId;
  setBreadcrumb(breadcrumb, esRaizCat);

  // Cargar subcarpetas e imágenes en paralelo
  const [dataFolders, dataImgs] = await Promise.all([
    api({ action:'list', parentId: folderId, type:'folders' }),
    api({ action:'list', parentId: folderId, type:'images' })
  ]);

  const subs = dataFolders.files || [];
  const imgs = dataImgs.files || [];

  ocultarEstado();

  if(!subs.length && !imgs.length) {
    setEstado('Esta carpeta está vacía.');
    return;
  }

  const grid = document.getElementById('grid');
  let html = '';

  // Subcarpetas primero
  if(subs.length > 0) {
    html += `<div class="grid-carpetas" id="c-inner">${carpetasHTML(subs, breadcrumb)}</div>`;
  }

  // Imágenes debajo
  if(imgs.length > 0) {
    visorImgs = imgs;
    html += `<div class="grid-imgs" id="imgs-inner">${
      imgs.map((img, i) => `
        <div class="img-card" onclick="abrirVisor(${i})">
          <img src="${img.thumbnailLink}" alt="${img.name}" loading="lazy" onerror="this.style.opacity='0'">
          <div class="img-name">${img.name}</div>
        </div>`).join('')
    }</div>`;
  }

  grid.innerHTML = html;

  // Botón ver más carpetas
  if(dataFolders.nextPageToken) renderBtnMasCarpetas(folderId, breadcrumb, dataFolders.nextPageToken);

  // Botón ver más imágenes
  if(dataImgs.nextPageToken) {
    const pag = document.getElementById('pag');
    const btn = document.createElement('button');
    btn.className = 'btn-mas';
    btn.textContent = 'Ver más imágenes →';
    btn.onclick = () => mostrarMasImgs(folderId, dataImgs.nextPageToken);
    pag.appendChild(btn);
  }
}

async function mostrarMasImgs(folderId, pageToken) {
  const data = await api({ action:'list', parentId: folderId, type:'images', pageToken });
  const imgs = data.files || [];
  visorImgs = visorImgs.concat(imgs);
  const inner = document.getElementById('imgs-inner');
  if(inner) inner.innerHTML += imgs.map((img, i) => {
    const idx = visorImgs.length - imgs.length + i;
    return `<div class="img-card" onclick="abrirVisor(${idx})">
      <img src="${img.thumbnailLink}" alt="${img.name}" loading="lazy" onerror="this.style.opacity='0'">
      <div class="img-name">${img.name}</div>
    </div>`;
  }).join('');
  const pag = document.getElementById('pag');
  pag.innerHTML = '';
  if(data.nextPageToken) {
    const btn = document.createElement('button');
    btn.className = 'btn-mas';
    btn.textContent = 'Ver más imágenes →';
    btn.onclick = () => mostrarMasImgs(folderId, data.nextPageToken);
    pag.appendChild(btn);
  }
}

function renderCarpetas(carpetas, parentId, breadcrumb, nextToken) {
  const grid = document.getElementById('grid');
  grid.innerHTML = `<div class="grid-carpetas" id="c-inner">${carpetasHTML(carpetas, breadcrumb)}</div>`;
  renderBtnMasCarpetas(parentId, breadcrumb, nextToken);
}

function carpetasHTML(arr, breadcrumb) {
  return arr.map(c => {
    const nb = (breadcrumb ? breadcrumb + ' › ' : '') + c.name;
    const esc = nb.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const idEsc = c.id.replace(/'/g,"\\'");
    return `<div class="carpeta-card" onclick="entrarCarpeta('${idEsc}','${esc}')">
      <div class="icon">📁</div>
      <div class="name">${c.name}</div>
    </div>`;
  }).join('');
}

function renderBtnMasCarpetas(parentId, breadcrumb, token) {
  const pag = document.getElementById('pag');
  pag.innerHTML = '';
  if(!token) return;
  const btn = document.createElement('button');
  btn.className = 'btn-mas';
  btn.textContent = 'Ver más →';
  btn.onclick = async () => {
    btn.disabled = true; btn.textContent = '⏳';
    const data = await api({ action:'list', parentId, type:'folders', pageToken: token });
    const inner = document.getElementById('c-inner');
    if(inner) inner.innerHTML += carpetasHTML(data.files || [], breadcrumb);
    renderBtnMasCarpetas(parentId, breadcrumb, data.nextPageToken);
  };
  pag.appendChild(btn);
}

window.entrarCarpeta = async function(folderId, breadcrumb) {
  // Guardar estado anterior en historial
  historial.push({ folderId: carpetaId, breadcrumb: document.getElementById('breadcrumb').dataset.texto || '' });
  setBreadcrumb(breadcrumb, false);
  await mostrarContenido(folderId, breadcrumb);
};

window.volverAtras = async function() {
  if(!historial.length) return;
  const prev = historial.pop();
  if(!prev.folderId) {
    // Volver a selección inicial
    setBreadcrumb('');
    setEstado('Selecciona una categoría para explorar.');
    carpetaId = null;
    return;
  }
  setBreadcrumb(prev.breadcrumb, false);
  await mostrarContenido(prev.folderId, prev.breadcrumb);
};

async function mostrarImgs(folderId, pageToken) {
  const data = await api({ action:'list', parentId: folderId, type:'images', pageToken: pageToken || '' });
  const imgs = data.files || [];

  if(!imgs.length && !pageToken) {
    setEstado('No hay imágenes en esta carpeta.');
    return;
  }

  ocultarEstado();
  if(!pageToken) visorImgs = [];
  visorImgs = visorImgs.concat(imgs);

  const grid = document.getElementById('grid');
  const cards = imgs.map((img, i) => {
    const idx = visorImgs.length - imgs.length + i;
    return `<div class="img-card" onclick="abrirVisor(${idx})">
      <img src="${img.thumbnailLink}" alt="${img.name}" loading="lazy" onerror="this.style.opacity='0'">
      <div class="img-name">${img.name}</div>
    </div>`;
  }).join('');

  if(pageToken) {
    const gi = grid.querySelector('.grid-imgs');
    if(gi) gi.innerHTML += cards;
  } else {
    grid.innerHTML = `<div class="grid-imgs">${cards}</div>`;
  }

  const pag = document.getElementById('pag');
  pag.innerHTML = '';
  if(data.nextPageToken) {
    const btn = document.createElement('button');
    btn.className = 'btn-mas';
    btn.textContent = 'Ver más imágenes →';
    btn.onclick = () => mostrarImgs(folderId, data.nextPageToken);
    pag.appendChild(btn);
  }
}

// ── BÚSQUEDA ───────────────────────────────────────────────
window.buscar = async function() {
  const q = document.getElementById('q-input').value.trim();
  if(!q) return;

  const parentId = carpetaId || ROOT;
  setEstado('⏳ Buscando...');
  visorImgs = [];
  document.getElementById('pag').innerHTML = '';

  try {
    // 1. Buscar subcarpeta con ese nombre en la carpeta actual
    const dataFolders = await api({ action:'list', parentId, type:'folders', q });
    if(dataFolders.files?.length) {
      const found = dataFolders.files[0];
      historial.push({ folderId: carpetaId, breadcrumb: document.getElementById('breadcrumb').dataset.texto || '' });
      await mostrarContenido(found.id, found.name);
      return;
    }

    // 2. Buscar imágenes con ese nombre en la carpeta actual
    const dataImgs = await api({ action:'list', parentId, type:'images', q });
    if(dataImgs.files?.length) {
      visorImgs = dataImgs.files;
      ocultarEstado();
      setBreadcrumb(`Resultados: "${q}"`);
      document.getElementById('grid').innerHTML = `<div class="grid-imgs">${
        dataImgs.files.map((img, i) => `
          <div class="img-card" onclick="abrirVisor(${i})">
            <img src="${img.thumbnailLink}" alt="${img.name}" loading="lazy" onerror="this.style.opacity='0'">
            <div class="img-name">${img.name}</div>
          </div>`).join('')
      }</div>`;
      return;
    }

    setEstado(`No se encontraron resultados para "${q}".`);

  } catch(e) {
    setEstado('❌ Error al buscar.');
    console.error(e);
  }
};

// ── BREADCRUMB ─────────────────────────────────────────────
function setBreadcrumb(texto, esRaiz = false) {
  const el = document.getElementById('breadcrumb');
  el.dataset.texto = texto;
  if(!texto) { el.style.display = 'none'; historial = []; return; }
  el.style.display = 'flex';
  const botonVolver = !esRaiz && historial.length > 0
    ? `<button onclick="volverAtras()" style="background:none;border:1.5px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;color:var(--soft);margin-right:4px;">← Volver</button>`
    : '';
  el.innerHTML = `${botonVolver}<span style="color:var(--text);font-weight:600;">${texto}</span>`;
}

// ── UTILIDADES ─────────────────────────────────────────────
function setEstado(msg) {
  document.getElementById('estado').textContent = msg;
  document.getElementById('estado').style.display = 'block';
  document.getElementById('grid').innerHTML = '';
  document.getElementById('pag').innerHTML = '';
}
function ocultarEstado() {
  document.getElementById('estado').style.display = 'none';
}

// ── VISOR ──────────────────────────────────────────────────
window.abrirVisor = function(idx) {
  visorIdx = idx;
  document.getElementById('visor').classList.add('open');
  actualizarVisor();
  document.onkeydown = e => {
    if(e.key==='ArrowRight') visorNav(1);
    if(e.key==='ArrowLeft')  visorNav(-1);
    if(e.key==='Escape')     cerrarVisor();
  };
};
window.cerrarVisor = function() {
  document.getElementById('visor').classList.remove('open');
  document.onkeydown = null;
};
window.visorNav = function(d) {
  visorIdx = (visorIdx + d + visorImgs.length) % visorImgs.length;
  actualizarVisor();
};
function actualizarVisor() {
  const img = visorImgs[visorIdx];
  if(!img) return;
  document.getElementById('visor-img').src = `https://drive.google.com/thumbnail?id=${img.id}&sz=w1200`;
  document.getElementById('visor-info').textContent = img.name;
  document.getElementById('visor-count').textContent = `${visorIdx+1} / ${visorImgs.length}`;
}

// ── PEDIDO ─────────────────────────────────────────────────
window.abrirPedido = function(img) {
  imgActual = img;
  colorSel=''; generoSel=''; tallaSel=''; cantSel=1;
  document.getElementById('mp-img').innerHTML = `<img src="https://drive.google.com/thumbnail?id=${img.id}&sz=w600" style="width:100%;aspect-ratio:1;object-fit:cover;">`;
  document.getElementById('mp-nombre').textContent = img.name.replace(/\.\w+$/,'');
  document.getElementById('mp-cant').textContent = '1';
  document.getElementById('mp-nombre-cliente').value = '';
  document.getElementById('mp-notas').value = '';
  const colores = ['Blanca','Negra','Gris','Marino','Royal','Rojo','Verde','Naranja','Canario'];
  document.getElementById('mp-colores').innerHTML = colores.map(c=>`<button class="opt" onclick="selOpt(this,'color','${c}')">${c}</button>`).join('');
  document.getElementById('mp-generos').innerHTML = Object.keys(TALLAS).map(g=>`<button class="opt" onclick="selOpt(this,'genero','${g}')">${g}</button>`).join('');
  document.getElementById('mp-tallas').innerHTML = '<span style="font-size:13px;color:var(--soft);">Elige un género</span>';
  document.getElementById('modal-pedido').classList.add('open');
};
window.selOpt = function(btn, tipo, val) {
  if(tipo==='color') { colorSel=val; document.querySelectorAll('#mp-colores .opt').forEach(b=>b.classList.remove('active')); }
  if(tipo==='genero') {
    generoSel=val; tallaSel='';
    document.querySelectorAll('#mp-generos .opt').forEach(b=>b.classList.remove('active'));
    document.getElementById('mp-tallas').innerHTML = (TALLAS[val]||[]).map(t=>`<button class="opt" onclick="selOpt(this,'talla','${t}')">${t}</button>`).join('');
  }
  if(tipo==='talla') { tallaSel=val; document.querySelectorAll('#mp-tallas .opt').forEach(b=>b.classList.remove('active')); }
  btn.classList.add('active');
};
window.cambiarCant = function(d) { cantSel=Math.max(1,cantSel+d); document.getElementById('mp-cant').textContent=cantSel; };
window.agregarAlCarrito = function() {
  if(!colorSel) { alert('Selecciona el color'); return; }
  if(!generoSel) { alert('Selecciona el género'); return; }
  if(!tallaSel) { alert('Selecciona la talla'); return; }
  carrito.push({ id:imgActual.id, nombre:imgActual.name.replace(/\.\w+$/,''),
    img:`https://drive.google.com/thumbnail?id=${imgActual.id}&sz=w200`,
    color:colorSel, genero:generoSel, talla:tallaSel, cant:cantSel,
    notas:document.getElementById('mp-notas').value,
    uid:Date.now().toString() });
  actualizarBadge();
  cerrarOverlay('modal-pedido');
  const t=document.createElement('div');
  t.textContent='✅ Agregado al pedido';
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:9999;';
  document.body.appendChild(t); setTimeout(()=>t.remove(),2000);
};

// ── CARRITO ────────────────────────────────────────────────
function actualizarBadge() { document.getElementById('c-count').textContent=carrito.reduce((s,i)=>s+i.cant,0); }
window.abrirCarrito = function() {
  const items=document.getElementById('c-items'), empty=document.getElementById('c-empty'), footer=document.getElementById('c-footer');
  if(!carrito.length) { items.innerHTML=''; empty.style.display='block'; footer.style.display='none'; }
  else {
    empty.style.display='none'; footer.style.display='block';
    items.innerHTML=carrito.map(i=>`<div class="c-item">
      <img src="${i.img}" onerror="this.style.opacity='0'">
      <div style="flex:1;"><div style="font-weight:600;font-size:14px;">${i.nombre}</div>
      <div style="font-size:12px;color:var(--soft);">${i.color} · ${i.genero} · ${i.talla} · x${i.cant}</div></div>
      <button onclick="eliminarItem('${i.uid}')" style="background:none;border:none;color:#C0392B;cursor:pointer;font-size:18px;">🗑</button>
    </div>`).join('');
  }
  document.getElementById('carrito').classList.add('open');
};
window.eliminarItem = function(uid) { carrito=carrito.filter(i=>i.uid!==uid); actualizarBadge(); abrirCarrito(); };
window.vaciarCarrito = function() { if(!confirm('¿Vaciar?')) return; carrito=[]; actualizarBadge(); abrirCarrito(); };
window.enviarWs = function() {
  if(!carrito.length) return;
  const nombre = document.getElementById('mp-nombre-cliente')?.value || '';
  let msg=`Hola! Quisiera hacer un pedido 👕\n`;
  if(nombre) msg+=`*Cliente:* ${nombre}\n`;
  msg+=`\n*MI PEDIDO:*\n`;
  carrito.forEach((i,n)=>{
    msg+=`\n${n+1}. *${i.nombre}*\n   🎨 ${i.color} · 👤 ${i.genero} · 📏 ${i.talla} · x${i.cant}\n`;
    if(i.notas) msg+=`   📝 ${i.notas}\n`;
  });
  msg+=`\n¿Pueden confirmar disponibilidad? ¡Gracias!`;
  window.open(`https://wa.me/${WS}?text=${encodeURIComponent(msg)}`,'_blank');
};

window.cerrarOverlay = function(id) { document.getElementById(id).classList.remove('open'); };
document.querySelectorAll('.overlay,.c-overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); }));
</script>
</body>
</html>
